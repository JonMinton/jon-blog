project:
  type: website
  output-dir: docs
  pre-render: pre-render.R
website:
  title: Jon Minton's Blog
  site-url: https://jonminton.github.io/jon-blog/
  description: Jon Minton's personal blog. All things random.
  twitter-card:
    site: '@jonminton'
  navbar:
    left:
    - text: Statistics & Data Science
      menu:
      - text: Statistical Theory and Applications
        href: glms.qmd
      - text: Tardy Tuesday
        href: tardy-tuesday.qmd
      - text: Hand-drawn Statistics
        href: hand-drawn-statistics.qmd
    right:
    - unpop.qmd
    - about.qmd
    - icon: window-fullscreen
      href: https://jonminton.net
    - icon: github
      href: https://github.com/JonMinton
    - icon: twitter
      href: https://twitter.com/JonMinton
    - icon: linkedin
      href: https://uk.linkedin.com/in/jon-minton-09480b13a
    - icon: rss
      href: index.xml
format:
  html:
    theme:
      # styles.css folded into each theme so Quarto compiles it into the
      # hashed bootstrap-X.min.css / bootstrap-dark-X.min.css bundles.
      # That gives every CSS deploy automatic cache-busting; previously
      # `css: styles.css` was served unhashed with max-age=600, so changes
      # took up to 10 min to reach existing visitors. (Changed 2026-06-16.)
      dark: [slate, styles.scss]
      light: [cosmo, styles.scss]
